{% extends "base.html" %}
{% block title %}Error{% endblock %}

{% block content %}
<div class="card" style="text-align:center; padding: 48px 24px;">
  <div style="font-size: 3rem; margin-bottom: 16px;">&#9888;</div>
  <h2 style="margin-bottom: 12px;">{{ error.code }} — {{ error.name }}</h2>
  <p class="muted-text">{{ error.description }}</p>
  <a href="{{ url_for('main.index') }}" class="btn btn-primary" style="margin-top: 24px;">Back to Tools</a>
</div>
{% endblock %}
