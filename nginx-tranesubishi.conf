# Nginx vhost fragment for tranesubishi.com — Flask app proxy
#
# This replaces the static-file server block for tranesubishi.com HTTPS.
# The /hearth path continues to proxy to the family-tasks container (port 5055).
# The root path / now proxies to the vrf-tools-tranesubishi Flask container (port 5052).
#
# To apply:
#   1. Edit /etc/nginx/sites-available/tranesubishi
#   2. Replace the tranesubishi.com :443 server block's location blocks per below
#   3. sudo nginx -t && sudo systemctl reload nginx

# In /etc/nginx/sites-available/tranesubishi, find the server block:
#   server {
#       listen 443 ssl;
#       listen [::]:443 ssl;
#       server_name tranesubishi.com www.tranesubishi.com;
#       ...
#
# Remove these lines:
#       root /usr/share/nginx/html/tranesubishi-site;
#       index index.html;
#
# Replace this block:
#       location / {
#           try_files $uri $uri/ =404;
#       }
#
# With:

    location / {
        proxy_pass            http://127.0.0.1:5052;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        client_max_body_size  50M;
        proxy_read_timeout    180s;
        proxy_send_timeout    180s;
    }
