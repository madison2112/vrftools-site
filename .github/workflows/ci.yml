name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      # ruff format --check omitted until P2-xx mass-format card
      # re-enable with: - run: ruff format --check .
      - run: pytest
      # --- HC-08 visual regression ---
      - name: Install Playwright browsers
        run: playwright install --with-deps chromium
      - name: Visual regression
        run: pytest tests/test_visual_regression.py -v
      - name: Upload visual diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            /tmp/pytest-of-*/pytest-current/test_route_visual_baseline*/
          if-no-files-found: ignore
